<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskmaster • Output</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    
    #stage {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100vw !important;
      height: 100vh !important;
      object-fit: contain !important; 
      background: black;
      outline: none;
      border: none;
    }

    video::-webkit-media-controls {
      display: none !important;
    }

    webview, img {
      width: 100vw;
      height: 100vh;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script>
    const stage = document.getElementById('stage');
    function clearStage(){ stage.innerHTML = ''; }

    function showVideo(src, autoplay=true, loop=false, poster=null){
      clearStage();
      const v = document.createElement('video');
      v.src = src;
      v.controls = false;
      v.removeAttribute('controls');
      v.autoplay = !!autoplay;
      v.loop = !!loop;
      if (poster) v.poster = poster;
      
      v.addEventListener('canplay', () => {
        v.play().catch(e => console.error("Playback failed:", e));
      });
      
      stage.appendChild(v);
    }

    function showImage(src){
      clearStage();
      const img = document.createElement('img');
      img.src = src;
      stage.appendChild(img);
    }

    // FIX: Accepts scoreboard data and injects it securely!
    function showWebview(src, scoreboardData){
      clearStage();
      const wv = document.createElement('webview');
      wv.setAttribute('src', src);
      wv.setAttribute('allowpopups', 'true');
      wv.setAttribute('useragent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/90.0.4430.212 Safari/537.36');
      wv.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture');
      
      if (scoreboardData) {
        wv.addEventListener('dom-ready', () => {
          // We safely encode the JSON data so profile picture base64s and quotes don't break the injection
          const encodedData = encodeURIComponent(JSON.stringify(scoreboardData));
          const script = `window.postMessage({ type: 'scoreboard:load', payload: JSON.parse(decodeURIComponent('${encodedData}')) }, '*');`;
          wv.executeJavaScript(script);
        });
      }

      stage.appendChild(wv);
    }

    window.taskmasterAPI.onOutputShow((payload)=>{
      if (!payload || !payload.type) return;
      if (payload.type === 'video') showVideo(payload.src, payload.autoPlay, payload.loop, payload.poster);
      else if (payload.type === 'image') showImage(payload.src);
      else if (payload.type === 'iframe') showWebview(payload.src, payload.scoreboardData); // Passes the data down!
    });
  </script>
</body>
</html>
